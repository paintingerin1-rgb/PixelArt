<div class="register-container">
  <h1>Register</h1>
  <input
    type="email"
    [value]="email()"
    (input)="email.set($event.target.value)"
    placeholder="Email"
  />
  <input
    type="password"
    [value]="password()"
    (input)="password.set($event.target.value)"
    placeholder="Password"
  />
  <button (click)="onSubmit()">Register</button>
  <p class="error">{{ errorMessage() }}</p>
</div>
