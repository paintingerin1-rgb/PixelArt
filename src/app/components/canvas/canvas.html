<div class="topbar">
  <span class="logo">Pix Art</span>
  <div class="user-info">
    <span>{{ authService.session()?.user?.email }}</span>
    <button (click)="logOut()">Log Out</button>
  </div>
</div>

<div class="canvas-container">
  <h1>Canvas</h1>
  <p class="error">{{ errorMessage() }}</p>

  @if (canvasState() && canvasState()!.owner_id === authService.currentUser?.id) {
    <app-share-canvas [canvasId]="canvasState()!.id" />
  }

  <!-- canvas.html -->
  @if (canvasState()) {
    <app-pixel-grid [canvasId]="canvasState()!.id" [gridSize]="canvasState()!.size" />
  }
</div>
