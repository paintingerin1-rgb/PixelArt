<div class="canvas-container">
  <h1>Canvas</h1>
  <p class="user-email">Logged in as: {{ authService.session()?.user?.email }}</p>
  <button (click)="logOut()">Log Out</button>
  <p class="error">{{ errorMessage() }}</p>

  <!-- canvas.html -->
  @if (canvasState()) {
    <app-pixel-grid [canvasId]="canvasState()!.id" [gridSize]="canvasState()!.size" />
  }
</div>
